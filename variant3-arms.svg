<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">

  <defs>
    <!-- Per pale: hard stop at 50% of the shield's bounding box (x=40..240, midpoint=140) -->
    <linearGradient id="perPale" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="50%" stop-color="#1A3A8A"/>
    </linearGradient>
  </defs>

  <!-- ── SHIELD FIELD: per pale Or (gold) and Azure (blue) ── -->
  <path d="M45,22 L255,22 L255,190 C255,278 200,322 150,344 C100,322 45,278 45,190 Z"
        fill="url(#perPale)"/>

  <!-- Pale division line -->
  <line x1="150" y1="22" x2="150" y2="344" stroke="#1A0A00" stroke-width="2.5"/>

  <!-- ── DEXTER CHIEF: Latin Cross Sable on Or (gold) field ── -->
  <!-- Vertical arm -->
  <rect x="90" y="44" width="11" height="50" rx="2" fill="#111111"/>
  <!-- Horizontal arm -->
  <rect x="69"  y="61" width="53" height="11" rx="2" fill="#111111"/>

  <!-- ── SINISTER CHIEF: Open Book Argent on Azure (blue) field ── -->
  <g transform="translate(211,68)">
    <!-- Left page -->
    <path d="M-28,0 L0,0 L0,22 C-13,22 -28,18 -28,4 Z"
          fill="#F2EDD8" stroke="#8A7050" stroke-width="1.3"/>
    <!-- Right page -->
    <path d="M28,0 L0,0 L0,22 C13,22 28,18 28,4 Z"
          fill="#F2EDD8" stroke="#8A7050" stroke-width="1.3"/>
    <!-- Open arc at top -->
    <path d="M-28,0 C-14,-5 0,0 0,0 C0,0 14,-5 28,0"
          fill="none" stroke="#8A7050" stroke-width="1.3"/>
    <!-- Spine -->
    <line x1="0" y1="0" x2="0" y2="22" stroke="#4A2A10" stroke-width="3"/>
    <!-- Page lines — left -->
    <line x1="-22" y1="8"  x2="-4" y2="9"  stroke="#A88A60" stroke-width="1"/>
    <line x1="-22" y1="14" x2="-4" y2="15" stroke="#A88A60" stroke-width="1"/>
    <!-- Page lines — right -->
    <line x1="4"   y1="9"  x2="22" y2="8"  stroke="#A88A60" stroke-width="1"/>
    <line x1="4"   y1="15" x2="22" y2="14" stroke="#A88A60" stroke-width="1"/>
  </g>

  <!-- ── OVERALL CHARGE: Torch Argent enflamed Or — centred on the pale ── -->

  <!-- Flame: layered teardrops, outermost (dark) to innermost (pale) -->
  <path d="M150,156
           C134,140 131,114 138,90
           C142,74 147,60 150,48
           C153,60 158,74 162,90
           C169,114 166,140 150,156 Z"
        fill="#B84800"/>

  <path d="M150,152
           C136,137 134,114 140,92
           C143,78 147,64 150,53
           C153,64 157,78 160,92
           C166,114 164,137 150,152 Z"
        fill="#E86000"/>

  <path d="M150,146
           C138,132 137,113 142,94
           C145,82 148,70 150,60
           C152,70 155,82 158,94
           C163,113 162,132 150,146 Z"
        fill="#FF9A00"/>

  <path d="M150,138
           C140,126 140,110 144,96
           C146,86 149,76 150,67
           C151,76 154,86 156,96
           C160,110 160,126 150,138 Z"
        fill="#FFD000"/>

  <path d="M150,128
           C143,118 143,106 147,95
           C148,88 149,81 150,74
           C151,81 152,88 153,95
           C157,106 157,118 150,128 Z"
        fill="#FFF0A0"/>

  <!-- Torch cup (trapezoid, Or) -->
  <path d="M136,167 L164,167 L160,155 L140,155 Z"
        fill="#C8A030" stroke="#806010" stroke-width="1.5"/>

  <!-- Torch shaft (Argent) -->
  <rect x="141" y="167" width="18" height="76" rx="4"
        fill="#E8E0C8" stroke="#9A9070" stroke-width="1.8"/>

  <!-- Grip bands (Or) -->
  <rect x="139" y="187" width="22" height="7" rx="2.5" fill="#9A8860"/>
  <rect x="139" y="201" width="22" height="7" rx="2.5" fill="#9A8860"/>
  <rect x="139" y="215" width="22" height="7" rx="2.5" fill="#9A8860"/>

  <!-- ── SHIELD OUTLINE — drawn on top so charges don't bleed outside ── -->
  <path d="M45,22 L255,22 L255,190 C255,278 200,322 150,344 C100,322 45,278 45,190 Z"
        fill="none" stroke="#1A0A00" stroke-width="5"/>

  <!-- Inner gold fillet -->
  <path d="M54,30 L246,30 L246,190 C246,272 194,313 150,334 C106,313 54,272 54,190 Z"
        fill="none" stroke="#C9A84C" stroke-width="2"/>

  <!-- ── MOTTO SCROLL ── -->
  <!-- Main body -->
  <rect x="18" y="360" width="264" height="26" rx="3"
        fill="#F5F0E0" stroke="#8A7858" stroke-width="1.8"/>
  <!-- Left curl -->
  <path d="M18,360 C6,360 6,386 18,386"
        fill="#E8DEC8" stroke="#8A7858" stroke-width="1.5"/>
  <!-- Right curl -->
  <path d="M282,360 C294,360 294,386 282,386"
        fill="#E8DEC8" stroke="#8A7858" stroke-width="1.5"/>
  <!-- Motto text -->
  <text x="150" y="378"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', Times, serif"
        font-size="14"
        font-style="italic"
        fill="#1A1A1A">Fides Dividit · Ratio Unit</text>

</svg>
